name: SafeWalk CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test Python Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install paho-mqtt boto3 pyyaml 

      - name: Run sensor test
        run: |
          python3 -c "
          import json
          import sys
          sys.path.insert(0, 'sensors')
          print(' Sensor module imports OK')
          "

      - name: Run fog node test
        run: |
          python3 -c "
          import json
          import sys
          sys.path.insert(0, 'fog_node')
          print(' Fog node module imports OK')
          "

  deploy:
    name: Deploy Lambda to AWS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy Lambda function
        run: |
          cd cloud
          zip lambda_function.zip lambda_handler.py
          aws lambda update-function-code \
            --function-name safewalk-alert-handler \
            --zip-file fileb://lambda_function.zip \
            --region us-east-1
          echo " Lambda deployed successfully!"